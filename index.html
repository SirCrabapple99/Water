<!doctype html>
<html>

<head>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <svg>
    <defs>
      <filter id="myFilter" x="-100%" y="-100%" width="300%" height="300%">
        <feTurbulence id="turbulence" result="turbulence" numOctaves="3" baseFrequency="0">
          <animate id="ripple" attributeName="baseFrequency" values="0.02; 0" dur="1s" repeatCount="1"
            begin="indefinite" />
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="0" xChannelSelector="R" yChannelSelector="G"
          result="displaced">
          <animate id="scale" attributeName="scale" values="0; 20; 0" keyTimes="0; 0.2; 1" dur="1s" repeatCount="1"
            begin="ripple.begin" />
        </feDisplacementMap>
        <feOffset in="displaced" dx="0" dy="0" result="offsetted">
          <animate attributeName="dx" values="0; -7; 0" keyTimes="0; 0.2; 1" dur="1s" repeatCount="1"
            begin="ripple.begin" />
          <animate attributeName="dy" values="0; -7; 0" keyTimes="0; 0.2; 1" dur="1s" repeatCount="1"
            begin="ripple.begin" />
        </feOffset>
      </filter>
    </defs>
  </svg>

  <div id="buttonContainer">
    <div class="listButton" onclick="ripples()"></div>
  </div>
  <script src="script.js"></script>
</body>

</html>
